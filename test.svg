<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 500 120'
    style='background-color: #00000000;'
    width='500px' height='120px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 600;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Multiline -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='6000ms' fill="freeze"
                    values='m0,40 h0 ; m0,40 h0 ; m0,40 h500 ; m0,40 h500' keyTimes='0;0;0.83333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#00F0FF' font-size='35'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            Desarrollador Backend
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Multiline -->
                                <animate id='d1' attributeName='d' begin='0s;d1.end'
                    dur='12000ms' fill="freeze"
                    values='m0,80 h0 ; m0,80 h0 ; m0,80 h500 ; m0,80 h500' keyTimes='0;0.5;0.91666666666667;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#00F0FF' font-size='35'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            &amp; Mobile
        </textPath>
    </text>
</svg>
